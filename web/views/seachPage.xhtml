<?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
                "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://java.sun.com/jsp/jstl/core" xmlns:P="http://java.sun.com/jsf/html">

<f:view>

    <h:head><title>bitServer Seach</title></h:head>

    <h:body>
        <h:form id="form">
            <p:growl id="growl" showDetail="true" />
            <p:menubar>
                <p:menuitem value="Назад" outcome="homePage" icon="pi pi-backward"/>

                <f:facet name="options">
                    <div class="ui-input-icon-left p-mr-2">
                        <div align="right">ООО "Бит-Сервис" г.Чита, ул.Нечаева,68, тел: +7(3022)21-70-71</div>
                        <div align="right">Комплексные решения в области рентгенологии</div>
                    </div>
                </f:facet>
            </p:menubar>

            <p:dialog widgetVar="saveDialog" showEffect="fade" width="300"
                      message="Сохранить изменения?" header="Сохранить изменения?" severity="warn">



                <p:commandButton value="Yes" icon="pi pi-check" actionListener="#{settingsBean.saveConfig}"
                                 process="@this" oncomplete="PF('saveDialog').hide()" update="growl"/>

                <span style="padding: 20px;">&nbsp;</span>



                <p:commandButton value="No" type="button" styleClass="ui-button-secondary" icon="pi pi-times"
                                 onclick="PF('saveDialog').hide()"/>

            </p:dialog>
            <p:outputLabel style="margin-right: .5rem">Логин</p:outputLabel>


        </h:form>
    </h:body>
</f:view>
</html>
