<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:fn="http://xmlns.jcp.org/jsp/jstl/functions"
      xmlns:p="http://primefaces.org/ui">

<f:view>
    <h:head>
        <title>bitServer</title>
        <f:facet name="last">
            <link rel="stylesheet" type="text/css"
                  href="#{facesContext.externalContext.requestContextPath}/resources/css/primeflex.min.css" />
        </f:facet>
    </h:head>
    <style type="text/css">
        div.centercard
        {
            display: flex;
            justify-content: center;
            vertical-align: middle;
            horiz-align: center;
            vert-align: middle;
        }
    </style>

    <h:body>

        <h:form id="logform">

            <div class="centercard">
                <p:growl id="growl" showDetail="true" />
                <div>
                    <h:outputText style="font-size: large; margin-bottom: 5px; margin-top: 5px" value="bitServer log:" />
                </div>
            </div>

            <p:textEditor widgetVar="editor" secure="false" value="#{fn:replace(logBean.logtext,'\\n','&lt;br/&gt;')}">
                <f:facet name="toolbar">
                </f:facet>
            </p:textEditor>

        </h:form>

    </h:body>
</f:view>

</html>
