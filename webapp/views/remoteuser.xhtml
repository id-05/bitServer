<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:b = "http://java.sun.com/jsf/composite/jsfcomponent"
      xmlns:p="http://primefaces.org/ui" xmlns:P="http://java.sun.com/jsf/html">

<f:view>
    <h:head>
        <title>bitServer</title>
        <f:facet name="last">
            <link rel="stylesheet" type="text/css"
                  href="#{facesContext.externalContext.requestContextPath}/resources/css/primeflex.min.css" />
        </f:facet>
    </h:head>
    <style type="text/css">
        .ui-panel{
            margin: 10px;
            width: 200px;
        }

    </style>


    <h:body>

        <h:form id="remoteform">
            <p:growl id="growlMessageId" showDetail="true" widgetVar="growlMessageId"/>
            <div class="card">
                <p:menubar>
                    <p:menuitem style="margin-right: 5px" value="Очередь на описание" outcome="queueremote" icon="pi pi-list"/>
                    <p:menuitem style="margin-right: 5px" value="Текущее задание" outcome="rucurtask" icon="pi pi-file" disabled="#{!remoteDashboard.currentUser.hasBlockStudy}"/>
                    <p:menuitem style="margin-right: 5px" value="Мои описания" outcome="ruresults" icon="pi pi-inbox"/>
                    <f:facet name="options">

                        <div class="p-mr-2 p-as-center">
                            <div class="p-d-flex">
                                <p:commandButton icon="pi pi-user" disabled="true" value="Вы вошли как: #{remoteDashboard.currentUser.ruFamily} #{remoteDashboard.currentUser.ruName} #{remoteDashboard.currentUser.ruMiddleName}" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                                <p:commandButton icon="pi pi-save"  oncomplete="PF('diskspace').show()" value="#{settingsBean.usedSpace}" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                                <p:commandButton icon="pi pi-question-circle"  oncomplete="PF('about').show()" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                                <p:commandButton icon="pi pi-sign-in"  actionListener="#{autoriseBean.logout}" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                            </div>
                        </div>

                    </f:facet>
                </p:menubar>
            </div>

            <p:dialog id="about" showEffect="fade" modal="true" widgetVar="about" responsive="true">
                <b:about/>
            </p:dialog>

            <p:dialog id="diskspace" showEffect="fade" modal="true" widgetVar="diskspace" responsive="true">
                <b:diskspace directory="#{settingsBean.directory}" totalSpace="#{settingsBean.totalSpace}" freeSpace="#{settingsBean.freespace}" usedSpace="#{settingsBean.usedSpace}"/>
            </p:dialog>

        </h:form>


            <h:form id="db">

                <p:dashboard id="board" model="#{remoteDashboard.model}">

                    <p:ajax event="reorder" listener="#{remoteDashboard.handleReorder}" update=":remoteform:growlMessageId"/>

                    <p:panel id="current" header="Текущая задача" style="width: 280px">
                        <div class="p-field p-grid">
                            <label for="countblock" class="p-col-fixed" style="width:180px">Заблокированно: </label>
                            <div class="p-col">
                                <p:outputLabel id="countblock" value="#{remoteDashboard.countBlock}"/>
                            </div>
                        </div>

                        <div class="p-field p-grid">
                            <label for="timeleft" class="p-col-fixed" style="width:180px">Время на описание:</label>
                            <div class="p-col">
                                <p:outputLabel id="timeleft" value="#{remoteDashboard.timeLeft}">
                                    <f:convertDateTime dateStyle="full" timeZone="GMT+0" pattern="h:mm"  />
                                </p:outputLabel>
                            </div>
                        </div>

                    </p:panel>

                    <p:panel id="mystatistics" header="Ваша статистика" style="width: 280px">

                        <div class="p-field p-grid">
                            <label for="countToday" class="p-col-fixed" style="width:180px">Сегодня описано: </label>
                            <div class="p-col">
                                <p:outputLabel id="countToday" value="#{remoteDashboard.countToday}"/>
                            </div>
                        </div>

                        <div class="p-field p-grid">
                            <label for="countMounth" class="p-col-fixed" style="width:180px">В этом месяце:</label>
                            <div class="p-col">
                                <p:outputLabel id="countMounth" value="#{remoteDashboard.countMounth}"/>
                            </div>
                        </div>

                        <div class="p-field p-grid">
                            <label for="countAll" class="p-col-fixed" style="width:180px">Всего:</label>
                            <div class="p-col">
                                <p:outputLabel id="countAll" value="#{remoteDashboard.countAll}"/>

                            </div>
                        </div>

                    </p:panel>

                    <p:panel id="serverstatistics" header="Статистика сервера" style="width: 800px; height: 400px;">
                        <p:chart type="line" id="chart1" model="#{remoteDashboard.lineModel}" style="height:400px;"/>

                        <div id="searchdatetype" class="p-formgroup-inline" style="margin-left: 1em; margin-right: 1em; margin-bottom: 2em; margin-top: 2em">
                            <label for="dateSTART" class="p-col-fixed">C :</label>
                            <p:datePicker id="dateSTART" value="#{remoteDashboard.firstdate}">
                                <p:ajax event="dateSelect" listener="#{remoteDashboard.dateSelect}" update=":db:chart1"/>
                            </p:datePicker>
                            <label for="dateSTOP" class="p-col-fixed">ПО :</label>
                            <p:datePicker id="dateSTOP" value="#{remoteDashboard.seconddate}">
                                <p:ajax event="dateSelect" listener="#{remoteDashboard.dateSelect}" update=":db:chart1"/>
                            </p:datePicker>
                            <label for="option" class="p-col-fixed">Интервалы :</label>
                            <p:selectOneMenu id="option" value="#{remoteDashboard.typeChart}">
                                <f:selectItem itemLabel="Месяц" itemValue="mounth"/>
                                <f:selectItem itemLabel="Год" itemValue="year"/>
                                <p:ajax event="change" listener="#{remoteDashboard.chartOutput}" update=":db:chart1"/>
                            </p:selectOneMenu>
                        </div>
                    </p:panel>
                </p:dashboard>

            </h:form>

    </h:body>
</f:view>

</html>
