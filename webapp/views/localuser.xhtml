<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui" xmlns:P="http://java.sun.com/jsf/html">

<f:view>
    <h:head>
        <title>bitServer</title>
        <f:facet name="last">
            <link rel="stylesheet" type="text/css"
                  href="#{facesContext.externalContext.requestContextPath}/resources/css/primeflex.min.css" />
        </f:facet>
    </h:head>
    <style type="text/css">
        .ui-panel, div.ui-state-hover {
            margin: 10px;
            width: 200px;
        }

        .ui-dashboard-column {
            width: 220px;
        }
    </style>


    <h:body>
        <h:form id="form">
            <p:growl id="growlMessageId" showDetail="true" widgetVar="growlMessageId"/>
            <div class="card">
                <p:menubar>
                    <p:menuitem style="margin-right: 5px" value="Очередь" outcome="queue" icon="pi pi-list"/>
                    <f:facet name="options">

                        <div class="p-mr-2 p-as-center">
                            <div class="p-d-flex">
                                <p:commandButton value="Справка" icon="pi pi-question-circle"  actionListener="#{autoriseBean.logout}" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                                <p:commandButton value="Выйти" icon="pi pi-sign-in"  actionListener="#{autoriseBean.logout}" styleClass="rounded-button ui-button-secondary ui-button-flat"/>
                            </div>
                        </div>

                    </f:facet>
                </p:menubar>
            </div>

        </h:form>

        <div class="card">
            <h:form>

            </h:form>
        </div>

    </h:body>
</f:view>

</html>
