<html xmlns = "http://www.w3.org/1999/xhtml"
      xmlns:h = "http://java.sun.com/jsf/html"
      xmlns:f = "http://java.sun.com/jsf/core"
      xmlns:p="http://primefaces.org/ui"
      xmlns:composite = "http://java.sun.com/jsf/composite">

<composite:interface>
    <composite:attribute name = "totalSpace" />
    <composite:attribute name = "usedSpace" />
    <composite:attribute name = "freeSpace" />
    <composite:attribute name = "directory" />
</composite:interface>

<composite:implementation>

        <p:panel header="Статистика сервера" style="width: 1500px; height: 400px;" closable="true" >
            <p:chart type="line" id="chart1" model="#{remoteDashboard.lineModel}" style="height:400px;"/>

            <f:facet name="options">
                <p:menu>
                    <p:submenu label="Периоды">
                        <p:menuitem value="Месяцы" icon="pi pi-calendar" actionListener="#{remoteDashboard.setMounths}" update=":db:chart1"/>
                        <p:menuitem value="Годы" icon="pi pi-calendar-minus" actionListener="#{remoteDashboard.setYears}" update=":db:chart1"/>
                    </p:submenu>

                    <p:submenu label="Модальности">
                        <p:menuitem value="Все" icon="pi pi-calendar" actionListener="#{remoteDashboard.setMounths}" update=":db:chart1"/>
                        <p:menuitem value="МРТ" icon="pi pi-calendar-minus" actionListener="#{remoteDashboard.setYears}" update=":db:chart1"/>
                        <p:menuitem value="КТ" icon="pi pi-calendar-minus" actionListener="#{remoteDashboard.setYears}" update=":db:chart1"/>
                        <p:menuitem value="Рентген(остальные)" icon="pi pi-calendar-minus" actionListener="#{remoteDashboard.setYears}" update=":db:chart1"/>
                    </p:submenu>
                </p:menu>
            </f:facet>
        </p:panel>

</composite:implementation>
</html>
